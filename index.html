<head>

body{margin:0;font-family:Arial;background:#6f8faa;color:#fff;text-align:center}

<body>
<h1>RiNi Life</h1>
<div class="card" onclick="newMsg()">
<b>Mom's Message</b><br>

</div>
<script>
const arr=["오늘도 충분히 잘하고 있어","괜찮아, 천천히 가도 돼","너 잘하고 있어"];
function newMsg(){
 document.getElementById('msg').innerText=arr[Math.floor(Math.random()*arr.length)];
}
newMsg();
</script>
